<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S30-PRO Federation Dashboard</title>
    <style>
        body { background-color: #050505; color: #0f0; font-family: monospace; padding: 20px; }
        .block { border: 1px solid #333; padding: 15px; margin-bottom: 20px; background: #0a0a0a; box-shadow: 0 0 10px rgba(0,255,0,0.1); }
        h2 { color: #fff; border-bottom: 1px solid #333; padding-bottom: 5px; margin-top: 0; }
        .row { display: flex; justify-content: space-between; margin: 10px 0; font-size: 1.1em; }
        .val { color: #fff; font-weight: bold; }
        .val-ticker { color: #0ff; font-weight: bold; font-size: 1.2em; transition: all 0.3s ease; }
        .led { padding: 2px 8px; border-radius: 3px; font-weight: bold; font-size: 0.9em; }
        .green { background: #003300; color: #0f0; border: 1px solid #0f0; }
        
        /* Neon Purple Shadow for Critical Priority */
        .critical { 
            color: #E0B0FF !important; 
            text-shadow: 0 0 8px #BF00FF, 0 0 12px #BF00FF; 
            font-weight: 900;
        }
    </style>
</head>
<body>
    <h1>🔭 S30-PRO FEDERATION LINK</h1>

    <section class="block">
        <h2>FLIGHT VITALS</h2>
        <div class="row">LOCATION (MAIDENHEAD) <span id="telemetry-mh" class="val">SYNCING...</span></div>
        <div class="row">ACTIVE TARGET <span id="t-ticker" class="val-ticker">LOADING...</span></div>
    </section>

    <section class="block">
        <h2>POSTFLIGHT AUDIT</h2>
        <div class="row">LAST KNVWS REPORT <span id="r-stamp" class="val">NEVER</span><div class="led green">OK</div></div>
        <div class="row">FEDERATION SYNC <span class="val">ACTIVE</span><div class="led green">OK</div></div>
    </section>

    <script>
        // Safely catch the JSON injected by Python
        const targetData = {{ target_data | tojson | safe }};
        let tickerIndex = 0;

        function updateTicker() {
            const display = document.getElementById('t-ticker');
            if (!targetData || targetData.length === 0) {
                display.innerText = "NO TARGETS";
                return;
            }
            
            const target = targetData[tickerIndex];
            display.innerText = target.name;
            
            // Apply the Neon Purple Glow if critical
            if (target.priority === "CRITICAL") {
                display.className = "val-ticker critical";
            } else {
                display.className = "val-ticker";
            }
            
            tickerIndex = (tickerIndex + 1) % targetData.length;
        }

        function fetchTelemetry() {
            fetch('/telemetry')
                .then(res => res.json())
                .then(data => {
                    document.getElementById('telemetry-mh').innerText = data.maidenhead;
                })
                .catch(err => console.error("Telemetry error:", err));
        }

        // Start the rotation and polling
        setInterval(updateTicker, 3000);
        setInterval(fetchTelemetry, 5000);
        
        updateTicker();
        fetchTelemetry();
    </script>
</body>
</html>
